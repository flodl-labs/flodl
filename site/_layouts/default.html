<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — Deep learning in Rust{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — Deep learning in Rust{% endif %}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:type" content="website">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta property="og:image" content="{{ '/assets/images/logo.png' | absolute_url }}">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }} — Deep learning in Rust{% endif %}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ '/assets/images/logo.png' | absolute_url }}">

  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x1f9e0;</text></svg>">
</head>
<body>

<header class="site-header">
  <nav>
    <a href="{{ '/' | relative_url }}" class="logo"><img src="{{ '/assets/images/logo-nav.png' | relative_url }}" alt="floDl" class="logo-img"></a>
    <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="nav-links">
      <a href="{{ '/guide/' | relative_url }}" {% if page.url contains '/guide' %}class="active"{% endif %}>Guide</a>
      <a href="{{ '/guide/migration' | relative_url }}">PyTorch &rarr; Rust</a>
      <div class="nav-dropdown{% if page.url == '/benchmark' or page.url == '/ddp-benchmark' %} active{% endif %}">
        <span>Benchmarks &#9662;</span>
        <div class="nav-dropdown-menu">
          <a href="{{ '/ddp-benchmark' | relative_url }}" {% if page.url == '/ddp-benchmark' %}class="active"{% endif %}>DDP (multi-GPU)</a>
          <a href="{{ '/benchmark' | relative_url }}" {% if page.url == '/benchmark' %}class="active"{% endif %}>Solo (flodl vs PyTorch)</a>
        </div>
      </div>
      <a href="{{ '/blog/' | relative_url }}" {% if page.url contains '/blog' %}class="active"{% endif %}>Blog</a>
      <a href="https://docs.rs/flodl">API Docs</a>
      <a href="https://github.com/fab2s/floDl" target="_blank" class="nav-gh">
        <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
        GitHub
      </a>
    </div>
  </nav>
</header>

{{ content }}

<footer class="site-footer">
  <div class="footer-links">
    <a href="https://github.com/fab2s/floDl">GitHub</a>
    <a href="https://docs.rs/flodl">API Docs</a>
    <a href="https://crates.io/crates/flodl">crates.io</a>
    <a href="{{ '/guide/' | relative_url }}">Guide</a>
    <a href="{{ '/benchmark' | relative_url }}">Solo Benchmark</a>
    <a href="{{ '/ddp-benchmark' | relative_url }}">DDP Benchmark</a>
    <a href="{{ '/blog/' | relative_url }}">Blog</a>
    <a href="{{ '/thesis' | relative_url }}">Thesis</a>
  </div>
  <p>floDl is open-source software licensed under the MIT License.</p>
  <p>Brought to you with ❤️ by <a href="https://github.com/fab2s">fab2s</a></p>
</footer>

</body>
</html>
