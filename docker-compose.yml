services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: flodl-dev
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - HOME=/root
    volumes:
      - .:/workspace
      # Cache Rust build artifacts and registry between runs
      - cargo-registry:/root/.cargo/registry
      - cargo-git:/root/.cargo/git
    working_dir: /workspace
    stdin_open: true
    tty: true

  cuda:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: flodl-cuda
    user: "${UID:-1000}:${GID:-1000}"
    environment:
      - HOME=/root
    volumes:
      - .:/workspace
      - cargo-registry-cuda:/root/.cargo/registry
      - cargo-git-cuda:/root/.cargo/git
    working_dir: /workspace
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  cargo-registry:
  cargo-git:
  cargo-registry-cuda:
  cargo-git-cuda:
