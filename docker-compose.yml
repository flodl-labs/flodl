services:
  dev:
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: flodl-dev
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/workspace
      - ./.cargo-cache:/usr/local/cargo/registry
      - ./.cargo-git:/usr/local/cargo/git
      - ./.cargo-credentials.toml:/usr/local/cargo/credentials.toml
    working_dir: /workspace
    stdin_open: true
    tty: true

  cuda:
    build:
      context: .
      dockerfile: Dockerfile.cuda
    image: flodl-cuda
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/workspace
      - ./.cargo-cache-cuda:/usr/local/cargo/registry
      - ./.cargo-git-cuda:/usr/local/cargo/git
      - ./.cargo-credentials.toml:/usr/local/cargo/credentials.toml
    working_dir: /workspace
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  bench:
    build:
      context: .
      dockerfile: Dockerfile.bench
    image: flodl-bench
    user: "${UID:-1000}:${GID:-1000}"
    volumes:
      - .:/workspace
      - ./.cargo-cache-bench:/usr/local/cargo/registry
      - ./.cargo-git-bench:/usr/local/cargo/git
    working_dir: /workspace
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  docs-rs:
    image: rust:latest
    volumes:
      - .:/workspace
      - ./.cargo-cache-docsrs:/usr/local/cargo/registry
      - ./.cargo-git-docsrs:/usr/local/cargo/git
      - ./.target-docsrs:/opt/target
    working_dir: /workspace/flodl
    environment:
      - CARGO_TARGET_DIR=/opt/target
      - DOCS_RS=1

  jekyll:
    image: jekyll/jekyll:4
    volumes:
      - ./site:/srv/jekyll
      - jekyll-bundle:/usr/local/bundle
    ports:
      - "4000:4000"
    command: bash -c "bundle install && jekyll serve --watch --force_polling --livereload"
    environment:
      - JEKYLL_ENV=development

volumes:
  jekyll-bundle:
