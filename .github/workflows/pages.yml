name: Deploy site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── Generate guide pages from docs/ + stubs ──
      - name: Build guide pages
        run: python3 site/build_guide.py

      # ── Copy scripts into site root ──
      # fdl: primary CLI bootstrap (flodl.dev/fdl)
      # init.sh: kept for backwards compatibility (existing links)
      - name: Copy scripts into site
        run: |
          cp fdl site/fdl
          cp init.sh site/init.sh

      # ── Jekyll site ─────────────────────────────
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./site
          destination: ./_site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
