name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - '*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'site/**'
      - '*.md'
      - 'LICENSE'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull_request_template.md'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  LIBTORCH_VERSION: "2.10.0"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  cpu:
    name: CPU (test + clippy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            wget unzip g++ pkg-config graphviz

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache cargo registry + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cpu-${{ hashFiles('**/Cargo.lock', '**/Cargo.toml') }}
          restore-keys: cpu-

      - name: Cache libtorch download
        id: cache-libtorch
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libtorch
          key: libtorch-cpu-${{ env.LIBTORCH_VERSION }}

      - name: Download libtorch (CPU)
        if: steps.cache-libtorch.outputs.cache-hit != 'true'
        run: |
          wget -q "https://download.pytorch.org/libtorch/cpu/libtorch-shared-with-deps-${LIBTORCH_VERSION}%2Bcpu.zip"
          unzip -q "libtorch-shared-with-deps-${LIBTORCH_VERSION}+cpu.zip"
          rm "libtorch-shared-with-deps-${LIBTORCH_VERSION}+cpu.zip"

      - name: Build
        env:
          LIBTORCH_PATH: ${{ github.workspace }}/libtorch
          LD_LIBRARY_PATH: ${{ github.workspace }}/libtorch/lib
          LIBRARY_PATH: ${{ github.workspace }}/libtorch/lib
        run: cargo build

      - name: Test
        env:
          LIBTORCH_PATH: ${{ github.workspace }}/libtorch
          LD_LIBRARY_PATH: ${{ github.workspace }}/libtorch/lib
          LIBRARY_PATH: ${{ github.workspace }}/libtorch/lib
        run: cargo test -- --nocapture

      - name: Clippy
        env:
          LIBTORCH_PATH: ${{ github.workspace }}/libtorch
          LD_LIBRARY_PATH: ${{ github.workspace }}/libtorch/lib
          LIBRARY_PATH: ${{ github.workspace }}/libtorch/lib
        run: cargo clippy -- -W clippy::all

      - name: Doc (strict, fails on warnings)
        # Clippy doesn't lint doc comments -- rustdoc is the only validator
        # for intra-doc links and HTML tags. Run doc as its own pass with
        # warnings promoted to errors so doc-comment regressions surface in CI.
        env:
          LIBTORCH_PATH: ${{ github.workspace }}/libtorch
          LD_LIBRARY_PATH: ${{ github.workspace }}/libtorch/lib
          LIBRARY_PATH: ${{ github.workspace }}/libtorch/lib
          RUSTDOCFLAGS: "-D warnings"
        run: |
          cargo doc --no-deps --document-private-items
          # Sanity check: build reported success, verify the top-level crate
          # index actually got written. Catches silent failures where doc
          # generation produces nothing useful.
          test -f target/doc/flodl/index.html

  cuda-build:
    name: CUDA (build + clippy)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
            /opt/ghc /usr/local/share/boost /opt/hostedtoolcache
          sudo apt-get clean
          df -h /

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: buildx-cuda-${{ hashFiles('Dockerfile.cuda') }}
          restore-keys: buildx-cuda-

      - name: Build CUDA Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cuda
          load: true
          tags: flodl-cuda-ci
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max

      # Rotate cache to prevent unbounded growth
      - name: Rotate buildx cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      - name: Cache libtorch download (CUDA)
        id: cache-libtorch-cuda
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/libtorch-ci
          key: libtorch-cu128-${{ env.LIBTORCH_VERSION }}

      - name: Download libtorch (CUDA)
        if: steps.cache-libtorch-cuda.outputs.cache-hit != 'true'
        run: |
          wget -q "https://download.pytorch.org/libtorch/cu128/libtorch-shared-with-deps-${LIBTORCH_VERSION}%2Bcu128.zip"
          unzip -q "libtorch-shared-with-deps-${LIBTORCH_VERSION}+cu128.zip"
          mv libtorch libtorch-ci
          rm "libtorch-shared-with-deps-${LIBTORCH_VERSION}+cu128.zip"

      - name: Build with CUDA feature
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/libtorch-ci:/usr/local/libtorch:ro" \
            -w /workspace \
            flodl-cuda-ci \
            cargo build --features cuda

      - name: Clippy with CUDA feature
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/libtorch-ci:/usr/local/libtorch:ro" \
            -w /workspace \
            flodl-cuda-ci \
            cargo clippy --features cuda -- -W clippy::all
